{% extends "base.html" %}

{% block content %}
<section class="workspace-grid">
  <article class="panel">
    <h2>Manual Notification</h2>
    <form class="form-stack" method="post" action="/notifications">
      <label>Title <input name="title" required /></label>
      <label>Type <input name="notification_type" value="manual" /></label>
      <label>Body <textarea name="body" required rows="5"></textarea></label>
      <button class="button" type="submit">Create</button>
    </form>
  </article>

  <article class="panel panel-wide">
    <h2>Notifications</h2>
    <div class="item-list">
      {% for notification in notifications %}
      <article class="item-row">
        <div>
          <strong>{{ notification.title }}</strong>
          <span>{{ notification.body }}</span>
        </div>
        <small>{{ notification.status }}</small>
      </article>
      {% else %}
      <p class="empty-state">No notifications yet.</p>
      {% endfor %}
    </div>
  </article>
</section>
{% endblock %}
